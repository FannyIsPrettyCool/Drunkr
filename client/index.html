<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>DRUNKR</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
      <div id="crosshair">
        <span></span><span></span><span></span><span></span>
      </div>
      <div id="hud-bottom">
        <div id="health"><span class="label">HP</span><span id="health-val">100</span></div>
        <div id="ammo-block">
          <div id="weapon-name">AK-44</div>
          <div id="ammo"><span id="ammo-cur">30</span><span class="sep">/</span><span id="ammo-max">30</span></div>
        </div>
      </div>
      <div id="scope" class="hidden">
        <div class="scope-ring"></div>
        <div class="scope-v"></div>
        <div class="scope-h"></div>
      </div>
      <div id="reload" class="hidden">
        <div id="reload-bar"><div id="reload-fill"></div></div>
        <span>RELOADING</span>
      </div>
      <div id="killfeed"></div>
      <div id="hitmarker"></div>
      <div id="damage-flash"></div>
      <div id="respawn" class="hidden">ELIMINATED<br /><small>respawning…</small></div>
      <div id="scoreboard" class="hidden"></div>
    </div>

    <!-- Lobby -->
    <div id="menu">
      <div class="menu-card">
        <h1>DRUNKR</h1>
        <p class="tagline">// neon arena · fast-paced FPS</p>
        <input id="name-input" maxlength="16" placeholder="callsign" autocomplete="off" />

        <div class="lobby-tabs">
          <button class="tab active" data-tab="play">PLAY</button>
          <button class="tab" data-tab="create">CREATE</button>
        </div>

        <div id="tab-play" class="tab-panel">
          <button id="quickplay" class="primary">QUICK PLAY</button>
          <div class="list-head"><span>SERVERS</span><button id="refresh" title="refresh">⟳</button></div>
          <div id="room-list"><div class="empty">no servers — create one!</div></div>
        </div>

        <div id="tab-create" class="tab-panel hidden">
          <label class="field">MAP
            <select id="cfg-map">
              <option value="neon_yard">Neon Yard — open arena</option>
              <option value="overdrive">Overdrive — two bases</option>
              <option value="blacksite">Blacksite — indoor maze</option>
            </select>
          </label>
          <label class="field">DIFFICULTY
            <select id="cfg-diff">
              <option value="easy">Easy</option>
              <option value="normal" selected>Normal</option>
              <option value="hard">Hard</option>
            </select>
          </label>
          <label class="check"><input type="checkbox" id="cfg-bots" checked /> Enable bots</label>
          <label class="field">BOTS <span id="cfg-botcount-val">4</span>
            <input type="range" id="cfg-botcount" min="0" max="10" value="4" />
          </label>
          <input id="cfg-name" maxlength="24" placeholder="server name (optional)" autocomplete="off" />
          <button id="create-btn" class="primary">CREATE &amp; PLAY</button>
        </div>

        <div id="status">connecting…</div>
        <div class="controls">
          <span>WASD move</span><span>SPACE jump/bhop</span><span>SHIFT crouch</span>
          <span>MOUSE aim</span><span>CLICK fire</span><span>R reload</span><span>TAB scores</span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
