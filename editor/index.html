<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DRUNKR · Level Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="topbar">
      <span class="brand">DRUNKR <b>EDITOR</b></span>
      <label>Load
        <select id="load-map">
          <option value="">— new —</option>
          <option value="neon_yard">Neon Yard</option>
          <option value="overdrive">Overdrive</option>
          <option value="blacksite">Blacksite</option>
          <option value="spire">Spire</option>
          <option value="atrium">Atrium</option>
          <option value="skyhaven">Skyhaven</option>
        </select>
      </label>
      <button id="add-box">+ Box</button>
      <select id="add-shape" title="Add a shape primitive">
        <option value="">+ Shape…</option>
        <option value="cylinder">Cylinder</option>
        <option value="sphere">Sphere</option>
        <option value="wedge">Wedge</option>
      </select>
      <button id="add-pad">+ Pad</button>
      <button id="add-light">+ Light</button>
      <button id="add-emitter">+ Emitter</button>
      <button id="add-hazard">+ Hazard</button>
      <button id="add-platform">+ Platform</button>
      <button id="add-spawn">+ Spawn</button>
      <span class="sep"></span>
      <button class="mode active" data-mode="translate" title="Move (W)">Move</button>
      <button class="mode" data-mode="rotate" title="Rotate (E)">Rotate</button>
      <button class="mode" data-mode="scale" title="Scale (R)">Scale</button>
      <button id="anchor" class="toggle" title="Anchored resize: one side stays put while you scale (off = grow symmetrically from center)">Anchor</button>
      <label class="snaplbl" title="Snap moves/sizes to a grid step">Snap
        <input id="snap-on" type="checkbox" checked />
        <input id="snap-size" type="number" step="0.5" min="0.1" value="1" />
      </label>
      <span class="sep"></span>
      <button id="undo" title="Undo (Ctrl+Z)">↶</button>
      <button id="redo" title="Redo (Ctrl+Y)">↷</button>
      <button id="duplicate" title="Duplicate (Ctrl+D)">Duplicate</button>
      <button id="delete" class="danger" title="Delete (Del)">Delete</button>
      <span class="spacer"></span>
      <button id="import">Import…</button>
      <button id="export" class="primary">Export JSON</button>
      <input id="file" type="file" accept="application/json" hidden />
    </div>

    <canvas id="view"></canvas>

    <div id="panel">
      <section>
        <h3>MAP</h3>
        <label>Name <input id="m-name" type="text" /></label>
        <label>Bounds <input id="m-bounds" type="number" step="1" /></label>
        <div class="counts" id="counts"></div>
      </section>

      <section id="props" class="hidden">
        <h3 id="prop-title">OBJECT</h3>
        <div class="multi-hint hidden" id="multi-hint"></div>
        <div class="grouplbl">POSITION</div>
        <div class="row3">
          <label>X <input id="p-px" type="number" step="0.5" /></label>
          <label>Y <input id="p-py" type="number" step="0.5" /></label>
          <label>Z <input id="p-pz" type="number" step="0.5" /></label>
        </div>
        <div class="grouplbl size-fields">SIZE</div>
        <div class="row3 size-fields">
          <label>W <input id="p-sx" type="number" step="0.5" /></label>
          <label>H <input id="p-sy" type="number" step="0.5" /></label>
          <label>D <input id="p-sz" type="number" step="0.5" /></label>
        </div>
        <div class="grouplbl rot-fields hidden">ROTATION °</div>
        <div class="row3 rot-fields hidden">
          <label>X <input id="p-rx" type="number" step="15" /></label>
          <label>Y <input id="p-ry" type="number" step="15" /></label>
          <label>Z <input id="p-rz" type="number" step="15" /></label>
        </div>
        <div class="grouplbl pad-fields hidden">LAUNCH</div>
        <div class="row3 pad-fields hidden">
          <label>Power <input id="p-str" type="number" step="1" /></label>
          <label>Yaw° <input id="p-yaw" type="number" step="15" /></label>
          <label>Pitch° <input id="p-pitch" type="number" step="5" /></label>
        </div>
        <div class="row3 light-fields hidden">
          <label>Intens <input id="p-lint" type="number" step="0.2" /></label>
          <label>Range <input id="p-lrange" type="number" step="1" /></label>
        </div>
        <div class="row3 emitter-fields hidden">
          <label>Rate <input id="p-erate" type="number" step="2" /></label>
          <label>Yaw° <input id="p-eyaw" type="number" step="15" /></label>
          <label>Pitch° <input id="p-epitch" type="number" step="5" /></label>
        </div>
        <label class="field hazard-fields hidden">DMG / SEC
          <input id="p-hdps" type="number" step="5" />
        </label>
        <div class="grouplbl platform-fields hidden">TRAVEL + PERIOD</div>
        <div class="row4 platform-fields hidden">
          <label>X <input id="p-tx" type="number" step="1" /></label>
          <label>Y <input id="p-ty" type="number" step="1" /></label>
          <label>Z <input id="p-tz" type="number" step="1" /></label>
          <label>Sec <input id="p-period" type="number" step="0.5" /></label>
        </div>
        <label class="field shape-fields hidden">SHAPE
          <select id="p-shape">
            <option value="box">Box</option>
            <option value="cylinder">Cylinder</option>
            <option value="sphere">Sphere</option>
            <option value="wedge">Wedge</option>
          </select>
        </label>
        <label class="field dir-fields hidden">RISE DIR
          <select id="p-dir">
            <option value="0">+X</option>
            <option value="1">-X</option>
            <option value="2">+Z</option>
            <option value="3">-Z</option>
          </select>
        </label>
        <div class="color-fields">
          <label>Color <input id="p-color" type="color" /></label>
          <label class="emi"><input id="p-emi-on" type="checkbox" /> Emissive
            <input id="p-emi" type="color" />
          </label>
        </div>
        <label class="field texture-fields">TEXTURE
          <select id="p-texture"></select>
        </label>
      </section>

      <section id="prebuilt-sec">
        <h3>PREBUILTS <span class="dim">· hover to preview</span></h3>
        <div id="prebuilt-grid"></div>
      </section>

      <section id="objlist-sec">
        <h3>OBJECTS <span class="dim">· ctrl-click = multi</span></h3>
        <div id="objlist"></div>
      </section>

      <p class="help">
        Drag = orbit · wheel = zoom · right-drag = pan · click = select<br />
        Ctrl-click = multi-select · F = focus · Del = delete · Ctrl-Z = undo
      </p>
    </div>

    <div id="preview-pop" class="hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
